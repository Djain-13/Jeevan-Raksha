# Railway Backend Configuration
# This file is for the BACKEND (Flask/Python) service only.
# Set this file's path in Railway → Service Settings → Config file path.
#
# Frontend service: set Start Command manually in Railway dashboard to:
#   npx serve -s build -l $PORT

[build]
builder = "nixpacks"

[deploy]
# Backend uses Procfile: "web: gunicorn run:app"
# Do NOT set startCommand here - it applies to both services.
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
